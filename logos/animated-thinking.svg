<!-- PitchShow Peach — Animated: Thinking (dash eyes drift + thinking dots) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 48" width="242" height="200" fill="none">
  <defs>
    <radialGradient id="pb" cx="40%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#e0d8ff"/>
      <stop offset="52%"  stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </radialGradient>
    <style>
      .eye-dash { animation: drift 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .eye-dash-r { animation: drift 2.4s ease-in-out infinite 0.05s; transform-box: fill-box; transform-origin: center; }
      .dot1 { animation: dotPop 1.2s ease-in-out infinite; }
      .dot2 { animation: dotPop 1.2s ease-in-out infinite 0.2s; }
      .dot3 { animation: dotPop 1.2s ease-in-out infinite 0.4s; }
      @keyframes drift {
        0%, 22%, 100% { transform: translateX(0); }
        35%, 55%      { transform: translateX(-3.5px); }
        67%, 87%      { transform: translateX(3.5px); }
      }
      @keyframes dotPop {
        0%, 60%, 100% { opacity: 0.15; transform: translateY(0); }
        30%            { opacity: 0.6;  transform: translateY(-3px); }
      }
    </style>
  </defs>

  <!-- Body -->
  <path d="M24,14 C21.5,5.5 4,9.5 4,21.5 C4,34 12.5,45 24,45 C35.5,45.5 44,34 44,21 C44,9 26.5,5 24,14 Z" fill="url(#pb)"/>
  <ellipse cx="27.5" cy="9.5" rx="4.8" ry="7.2" fill="#3d6428" transform="rotate(20 27.5 9.5)"/>
  <path d="M24,14 C24.5,11.5 26,10 27.5,8.5" stroke="#5a3818" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <ellipse cx="10" cy="33.5" rx="5.5" ry="3.2" fill="rgba(130,80,220,0.18)"/>
  <ellipse cx="38" cy="33.5" rx="5.5" ry="3.2" fill="rgba(130,80,220,0.18)"/>

  <!-- Thinking dash eyes drifting L/R -->
  <line class="eye-dash" x1="12.5" y1="27.5" x2="19.5" y2="27.5" stroke="#1a0810" stroke-width="2.2" stroke-linecap="round"/>
  <line class="eye-dash-r" x1="28.5" y1="27.5" x2="35.5" y2="27.5" stroke="#1a0810" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Thinking dots ... -->
  <circle class="dot1" cx="47" cy="20" r="1.4" fill="#7c3aed"/>
  <circle class="dot2" cx="51" cy="16" r="1.7" fill="#7c3aed"/>
  <circle class="dot3" cx="55" cy="11.5" r="2.0" fill="#7c3aed"/>
</svg>
