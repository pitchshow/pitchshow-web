<!-- PitchShow Peach — Animated: Happy (bounce + ^ ^ eyes + bigger blush) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 52" width="200" height="217" fill="none">
  <defs>
    <radialGradient id="pb" cx="40%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#FFF9F4"/>
      <stop offset="52%"  stop-color="#FFE8D8"/>
      <stop offset="100%" stop-color="#FFD0BA"/>
    </radialGradient>
    <style>
      .all { animation: bounce 0.9s ease-in-out infinite; transform-origin: 24px 45px; transform-box: fill-box; }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        30%       { transform: translateY(-8px) scaleY(1.03); }
        55%       { transform: translateY(-12px); }
        75%       { transform: translateY(-4px); }
      }
    </style>
  </defs>

  <g class="all">
    <path d="M24,14 C21.5,5.5 4,9.5 4,21.5 C4,34 12.5,45 24,45 C35.5,45.5 44,34 44,21 C44,9 26.5,5 24,14 Z" fill="url(#pb)"/>
    <ellipse cx="27.5" cy="9.5" rx="4.8" ry="7.2" fill="#3d6428" transform="rotate(20 27.5 9.5)"/>
    <path d="M24,14 C24.5,11.5 26,10 27.5,8.5" stroke="#5a3818" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Deeper blush for happy -->
    <ellipse cx="10" cy="33.5" rx="6.5" ry="4" fill="rgba(255,100,70,0.28)"/>
    <ellipse cx="38" cy="33.5" rx="6.5" ry="4" fill="rgba(255,100,70,0.28)"/>
    <!-- ^ ^ happy eyes -->
    <path d="M12.5,29 Q16,24 19.5,29" stroke="#1a0810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M28.5,29 Q32,24 35.5,29" stroke="#1a0810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Small smile -->
    <path d="M21.5,35 Q24,37.5 26.5,35" stroke="#1a0810" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- Stars -->
    <text x="1" y="15" font-size="7" fill="#1a0810" opacity="0.5" font-family="sans-serif">✦</text>
    <text x="38" y="13" font-size="6" fill="#1a0810" opacity="0.4" font-family="sans-serif">✦</text>
  </g>
</svg>
