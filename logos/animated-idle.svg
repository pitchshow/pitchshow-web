<!-- PitchShow Peach — Animated: Idle (breathe + blink + leaf sway) -->
<!-- Works in browser, Notion, GitHub README, many email clients -->
<!-- For GIF export: open in browser → screencapture or use SVGOMG/Figma -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" width="200" height="233" fill="none">
  <defs>
    <radialGradient id="pb" cx="40%" cy="28%" r="62%">
      <stop offset="0%"   stop-color="#FFF9F4"/>
      <stop offset="52%"  stop-color="#FFE8D8"/>
      <stop offset="100%" stop-color="#FFD0BA"/>
    </radialGradient>
    <style>
      .body { animation: breathe 3.6s ease-in-out infinite; transform-origin: 24px 29px; transform-box: fill-box; }
      .leaf { animation: sway 3.6s ease-in-out infinite; transform-origin: 27.5px 14px; transform-box: fill-box; }
      .stem { animation: sway 3.6s ease-in-out infinite; transform-origin: 27.5px 14px; transform-box: fill-box; }
      .eye-l { animation: blink 5.2s ease-in-out infinite; transform-origin: 16px 27px; transform-box: fill-box; }
      .eye-r { animation: blink 5.2s ease-in-out infinite 0.07s; transform-origin: 32px 27px; transform-box: fill-box; }
      @keyframes breathe {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-3px); }
      }
      @keyframes sway {
        0%, 100% { transform: rotate(20deg); }
        40%      { transform: rotate(14deg); }
        72%      { transform: rotate(25deg); }
      }
      @keyframes blink {
        0%, 78%, 100% { transform: scaleY(1); }
        83%  { transform: scaleY(0.06); }
        90%  { transform: scaleY(0.06); }
        95%  { transform: scaleY(1.05); }
      }
    </style>
  </defs>

  <!-- Leaf (outside body group, same animation) -->
  <ellipse class="leaf" cx="27.5" cy="9.5" rx="4.8" ry="7.2" fill="#3d6428" transform="rotate(20 27.5 9.5)"/>
  <path class="stem" d="M24,14 C24.5,11.5 26,10 27.5,8.5" stroke="#5a3818" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Body group: breathes -->
  <g class="body">
    <path d="M24,14 C21.5,5.5 4,9.5 4,21.5 C4,34 12.5,45 24,45 C35.5,45.5 44,34 44,21 C44,9 26.5,5 24,14 Z" fill="url(#pb)"/>
    <ellipse cx="10" cy="33.5" rx="5.5" ry="3.2" fill="rgba(255,140,120,0.15)"/>
    <ellipse cx="38" cy="33.5" rx="5.5" ry="3.2" fill="rgba(255,140,120,0.15)"/>
    <circle class="eye-l" cx="16" cy="27" r="2.2" fill="#1a0810"/>
    <circle class="eye-r" cx="32" cy="27" r="2.2" fill="#1a0810"/>
  </g>
</svg>
